# Early Plant Stress Detection Configuration

dataset:
  original_data_dir: "dataset/New Plant Diseases Dataset(Augmented)/New Plant Diseases Dataset(Augmented)/train"
  processed_data_dir: "data/processed"
  image_size: [224, 224]
  batch_size: 32
  num_workers: 4
  splits:
    train: 0.7
    valid: 0.15
    test: 0.15

training:
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 42
  device: "cuda"

texture_svm:
  glcm_distances: [1, 3, 5]
  glcm_angles: [0, 0.785398, 1.570796, 2.356194] # 0, 45, 90, 135 degrees
  lbp_radius: 3
  lbp_n_points: 24

alexnet:
  learning_rate: 0.001
  momentum: 0.9
  weight_decay: 0.005

mobilenet:
  unfreeze_top_ratio: 0.3
  base_lr: 0.0001
  head_lr: 0.001

anomaly_detection:
  contamination: 0.1

cross_crop:
  train_crops: ["Tomato", "Potato"]
  test_crops: ["Pepper", "Apple"]
